# OmriCode — Local AI Stack (llmaker)
# ---------------------------------------------------------------
# Docker Compose file for one-command local infrastructure.
# Spins up:
#   • Ollama (local LLM runner)
#   • Qdrant (vector database for codebase RAG)
#   • Langfuse (LLM observability — optional)
#
# Usage: docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: omricode-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omricode-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: omricode-langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - langfuse-db
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=omricode-dev-secret-change-in-production
      - SALT=omricode-dev-salt-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false

  langfuse-db:
    image: postgres:16-alpine
    container_name: omricode-langfuse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  qdrant_data:
  langfuse_data:
