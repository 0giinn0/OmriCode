name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ['website/**', 'editors/**']
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run compile
