name: build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run compile
      - run: npm test

  package:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npm run package
      - uses: actions/upload-artifact@v5
        with:
          name: omricode-vscode
          path: editors/vscode/*.vsix
